<!DOCTYPE html>
<html>
<head>
	<title>AutoSANP Dashboard</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<style>.table-container {max-height: 400px; overflow-y: auto;}</style>
</head>

	<body class="bg-light">
		<div class="container mt-5">
			<h1 class="mb-4">AutoSANP Control Center</h1>
		<div class="card shadow-sm p-4 mb-4">
			<h3>Management Actions</h3>
			<p class="text-muted">Deploy policies to managed clients</p>
			<a href="/run-policies" class="btn btn-primary btn-lg">Run Policies Now</a>
		</div>

		<div class="card shadow-sm p-4">
			<h3>Audit Logs</h3>
			<div class="table-container">
				<table class="table table-hover mt-3">
					<thead class="table-dark">
						<tr>
						<th scope="col">Time</th>
						<th scope="col">Action</th>
						<th scope="col">Status</th>
						</tr>

					</thead>
					<tbody>
						{%for log in logs%}
						<tr>
							<td>{{ log.timestamp }}</td>
						<td><strong>{{log.action}}</strong></td>
						<td><span class="badge rounded-pill {{'bg-success' if log.status == 'Success' else 'bg-danger'}}">{{log.status}}</span></td>
					</tr>
					{% endfor%}
				</tbody>
			</table>
		</div>
		</div>
		</div>
	</body>
</html>
